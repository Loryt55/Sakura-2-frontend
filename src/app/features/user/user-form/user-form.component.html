<div class="form-overlay">
  <h3>{{ user ? 'Edit User' : 'New User' }}</h3>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label>First Name</label>
      <input type="text" formControlName="firstName" placeholder="First name"/>
      <span class="error" *ngIf="f.firstName.invalid && f.firstName.touched">
        First name is required
      </span>
    </div>

    <div class="form-group">
      <label>Last Name</label>
      <input type="text" formControlName="lastName" placeholder="Last name"/>
      <span class="error" *ngIf="f.lastName.invalid && f.lastName.touched">
        Last name is required
      </span>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="Email address"/>
      <span class="error" *ngIf="f.email.invalid && f.email.touched">
        <span *ngIf="f.email.errors?.['required']">Email is required</span>
        <span *ngIf="f.email.errors?.['email']">Email must be valid</span>
      </span>
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" formControlName="phoneNumber" placeholder="Phone number"/>
      <span class="error" *ngIf="f.phoneNumber.invalid && f.phoneNumber.touched">
        Phone number is required
      </span>
    </div>

    <div class="form-group" *ngIf="!isEditing">
      <label>Password</label>
      <input type="password" formControlName="password" placeholder="Password"/>
      <span class="error" *ngIf="f.password.invalid && f.password.touched">
        <span *ngIf="f.password.errors?.['required']">Password is required</span>
        <span *ngIf="f.password.errors?.['minlength']">Min 6 characters</span>
      </span>
    </div>

    <div class="form-group">
      <label>Role</label>
      <select formControlName="roleId">
        <option [value]="0" disabled>Select a role</option>
        <option *ngFor="let role of roles" [value]="role.id">
          {{ role.name }}
        </option>
      </select>
      <span class="error" *ngIf="f.roleId.invalid && f.roleId.touched">
        Role is required
      </span>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="form.invalid || isLoading">
        {{ isLoading ? 'Saving...' : 'Save' }}
      </button>
      <button type="button" (click)="onCancel()">Cancel</button>
    </div>

  </form>
</div>
