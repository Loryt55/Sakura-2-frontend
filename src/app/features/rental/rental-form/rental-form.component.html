<div class="form-overlay">
  <h3>{{ rental ? 'Edit Rental' : 'New Rental' }}</h3>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">

    <div class="form-group">
      <label>Property</label>
      <select formControlName="propertyId">
        <option [value]="0" disabled>Select a property</option>
        <option *ngFor="let prop of properties" [value]="prop.id">
          {{ prop.name }} — {{ prop.city }}
        </option>
      </select>
      <span class="error" *ngIf="f.propertyId.invalid && f.propertyId.touched">
        Property is required
      </span>
    </div>

    <div class="form-group">
      <label>Tenant</label>
      <select formControlName="userId">
        <option [value]="0" disabled>Select a tenant</option>
        <option *ngFor="let tenant of tenants" [value]="tenant.id">
          {{ tenant.firstName }} {{ tenant.lastName }}
        </option>
      </select>
      <span class="error" *ngIf="f.userId.invalid && f.userId.touched">
        Tenant is required
      </span>
    </div>

    <div class="form-group">
      <label>Start Date</label>
      <input
        type="date"
        formControlName="startDate"
        [max]="maxStartDate"
        (click)="openDatePicker($event)"/>
      <span class="error" *ngIf="f.startDate.invalid && f.startDate.touched">
    Start date is required
  </span>
    </div>

    <div class="form-group">
      <label>End Date</label>
      <input type="date"
             formControlName="endDate"
             [min]="minEndDate"
             (click)="openDatePicker($event)"/>
      <span class="error" *ngIf="f.endDate.invalid && f.endDate.touched">
    End date is required
  </span>
    </div>

    <span class="error" *ngIf="dateRangeError">
      End date must be after start date
    </span>

    <div class="form-actions">
      <button type="submit" [disabled]="form.invalid">Save</button>
      <button type="button" (click)="onCancel()">Cancel</button>
    </div>

  </form>
</div>
